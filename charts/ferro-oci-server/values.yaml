# SPDX-License-Identifier: Apache-2.0
#
# Default values for the ferro-oci-server Helm chart.

# -----------------------------------------------------------------------------
# Image
# -----------------------------------------------------------------------------
image:
  # GHCR image published from deploy/ferro-oci-server/Dockerfile on v* tags.
  # Override to a private mirror in air-gapped / Artifactory setups, or
  # to `ferro-oci-server` for kind/minikube + pre-loaded local images.
  repository: ghcr.io/abyo-software/ferro-oci-server
  tag: "0.1.0"
  pullPolicy: IfNotPresent
  pullSecrets: []

# -----------------------------------------------------------------------------
# Workload kind
# -----------------------------------------------------------------------------
# Deployment with a single replica is the default. The server persists to a
# single ReadWriteOnce PVC, so scaling replicaCount > 1 requires either a
# RWX storage class or an external shared blob backend — keep at 1 unless
# the persistence.accessModes below is adjusted accordingly.
kind: Deployment
replicaCount: 1

# -----------------------------------------------------------------------------
# Naming overrides
# -----------------------------------------------------------------------------
nameOverride: ""
fullnameOverride: ""

# -----------------------------------------------------------------------------
# ServiceAccount
# -----------------------------------------------------------------------------
# The server needs no Kubernetes API access — the account exists only so the
# pod runs under a dedicated, automountable-token-free identity.
serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

# -----------------------------------------------------------------------------
# Resources
# -----------------------------------------------------------------------------
# axum/tokio idle footprint is small; blob I/O is the main driver. These are
# conservative starting points — size limits.memory to the largest concurrent
# upload working set plus headroom.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: "1"
    memory: 512Mi

# -----------------------------------------------------------------------------
# Persistence (blob store data directory)
# -----------------------------------------------------------------------------
# ferro-oci-server writes blob bytes under FERRO_OCI_STORAGE_DIR. The chart
# provisions a PVC and mounts it there. When persistence.enabled is false the
# server falls back to an emptyDir (non-durable — pod restart loses blobs;
# only for ephemeral test installs).
persistence:
  enabled: true
  # Mount path == FERRO_OCI_STORAGE_DIR (set on the container env below).
  mountPath: /var/lib/ferro-oci-server
  # Use an existingClaim to point at a pre-provisioned PVC instead of
  # templating one here.
  existingClaim: ""
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 20Gi
  annotations: {}

# -----------------------------------------------------------------------------
# Host namespace access
# -----------------------------------------------------------------------------
hostNetwork: false
hostPID: false
hostIPC: false
dnsPolicy: ""

# -----------------------------------------------------------------------------
# Pod-level security
# -----------------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  # fsGroup lets the non-root UID write to the PVC regardless of the
  # storage class's default ownership.
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  capabilities:
    drop:
      - ALL

# -----------------------------------------------------------------------------
# Pod scheduling
# -----------------------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

# -----------------------------------------------------------------------------
# Lifecycle
# -----------------------------------------------------------------------------
# axum graceful shutdown drains in-flight requests; 30 s covers a slow
# in-progress blob upload finishing.
terminationGracePeriodSeconds: 30

# -----------------------------------------------------------------------------
# Probes
# -----------------------------------------------------------------------------
# Backed by the /live (liveness) and /ready (readiness) endpoints on the
# server. /healthz returns {"status":"ok"} and is used by the Docker
# HEALTHCHECK; the kubelet probes use /live and /ready.
probes:
  liveness:
    enabled: true
    httpGet:
      path: /live
      port: 8080
    initialDelaySeconds: 3
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    enabled: true
    httpGet:
      path: /ready
      port: 8080
    initialDelaySeconds: 1
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  startup:
    enabled: false
    httpGet:
      path: /live
      port: 8080
    initialDelaySeconds: 0
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30

# -----------------------------------------------------------------------------
# Service (exposes /v2/, /live, /ready, /healthz)
# -----------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 8080
  annotations: {}

# -----------------------------------------------------------------------------
# Prometheus ServiceMonitor (prometheus-operator)
# -----------------------------------------------------------------------------
# ferro-oci-server exposes a Prometheus /metrics endpoint on the `http` port
# (request counters + latency histograms + a storage-blob-count gauge). This
# ServiceMonitor is ENABLED by default and scrapes `path: /metrics`. Set
# `enabled: false` if you scrape via pod annotations or a separate Agent.
serviceMonitor:
  enabled: true
  namespace: ""
  path: /metrics
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  relabelings: []
  metricRelabelings: []

# -----------------------------------------------------------------------------
# Pod annotations + labels
# -----------------------------------------------------------------------------
podAnnotations: {}
podLabels: {}

# -----------------------------------------------------------------------------
# Environment variables
# -----------------------------------------------------------------------------
# FERRO_OCI_LISTEN and FERRO_OCI_STORAGE_DIR are set by the chart from the
# service.port / persistence.mountPath values. Add extras here.
extraEnv: []
  # - name: RUST_LOG
  #   value: info
