apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ferro-oci-server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "ferro-oci-server.labels" . | nindent 4 }}
data:
  # Non-secret runtime configuration surfaced as environment variables.
  # The Deployment loads these via envFrom so a config edit + `helm upgrade`
  # rolls the pod (the deployment carries a checksum annotation).
  FERRO_OCI_LISTEN: "0.0.0.0:{{ .Values.service.port }}"
  FERRO_OCI_STORAGE_DIR: {{ .Values.persistence.mountPath | quote }}
