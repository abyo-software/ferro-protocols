apiVersion: v2
name: ferro-oci-server
description: |
  ferro-oci-server — Rust-native OCI Distribution (`/v2/`) registry server.

  Serves the OCI Distribution Spec (blob upload/download, manifests, tags,
  referrers, catalog) over HTTP with JSON `/healthz` and plain `/live`
  `/ready` probe endpoints. Persists blob bytes to a filesystem data
  directory, so the chart ships a PersistentVolumeClaim and mounts it at
  the storage path. Production defaults: non-root (UID 65534), read-only
  rootfs, dropped capabilities, seccomp RuntimeDefault.
type: application
version: 0.1.0
appVersion: "0.1.0"
kubeVersion: ">= 1.26.0-0"
home: https://github.com/abyo-software/ferro-protocols
sources:
  - https://github.com/abyo-software/ferro-protocols
keywords:
  - oci
  - registry
  - oci-distribution
  - container-registry
  - docker-registry
  - rust
maintainers:
  - name: abyo software 合同会社 (abyo software LLC)
    email: dev@abyo.net
    url: https://github.com/abyo-software
annotations:
