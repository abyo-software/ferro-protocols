# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: ""

# Cancel in-progress runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Job sizing rationale (Wave 13 CI capacity reduction):
#   * Self-hosted KVM runner pool is the bottleneck across the
#     ferro-* org — 13 repos x N PRs all share it. Total per-PR
#     KVM-job count is the headline metric, NOT per-job wall time.
#     Local profile on a 12 vCPU host shows the entire test suite
#     runs in ~9s of wall time after build; cargo check is ~24s
#     cold, ~2s warm with Swatinem cache.
#   * `cargo check` is folded into `clippy` (clippy is a superset).
#   * Cross-OS test matrix moved to `.github/workflows/cross-os.yml`
#     (weekly cron) — Linux KVM is the canonical target, ubuntu /
#     macos / windows are sanity checks that don't need to gate
#     every PR.
#   * `cargo install <tool>` replaced with `taiki-e/install-action`
#     which fetches a prebuilt binary (saves ~60-180s per job vs
#     building cargo-audit / cargo-deny from source).
#   * Coverage is push-on-main only (see coverage.yml).

jobs:
  clippy:
    # Supersedes a separate `cargo check` job — clippy implies check.
    name: clippy (-D warnings)
    runs-on: [self-hosted, Linux, X64, kvm]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.1
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  fmt:
    name: cargo fmt
    runs-on: [self-hosted, Linux, X64, kvm]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.1
          components: rustfmt
      - run: cargo fmt --all -- --check

  test:
    name: cargo test (KVM)
    runs-on: [self-hosted, Linux, X64, kvm]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.1
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  msrv:
    name: MSRV (1.88)
    runs-on: [self-hosted, Linux, X64, kvm]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2
      # MSRV check uses --no-default-features semantics consistent with
      # what we promise in each crate's README.
      - run: cargo check --workspace --all-targets

  deny:
    name: cargo deny
    runs-on: [self-hosted, Linux, X64, kvm]
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  audit:
    name: cargo audit
    runs-on: [self-hosted, Linux, X64, kvm]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.1
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit --deny warnings

  docs:
    name: cargo doc
    runs-on: [self-hosted, Linux, X64, kvm]
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.1
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features

  beta:
    # Early-warning signal for upcoming-stable regressions. This job runs
    # clippy + test on the Rust *beta* channel so we learn about a beta
    # regression weeks before it reaches stable. It is intentionally
    # NON-GATING (`continue-on-error: true`): a transient beta-only break
    # (e.g. a new lint or a nightly-derived behaviour change) must not block
    # PRs, but the job still runs and surfaces in the checks list.
    name: beta (non-gating)
    runs-on: [self-hosted, Linux, X64, kvm]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@beta
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features

  semver-checks:
    # Gates SemVer compliance for the upcoming 0.x -> 1.0.0 GA: every
    # published crate must not introduce an undeclared breaking change in
    # its public API relative to the last release on crates.io.
    # `cargo-semver-checks check-release` compares the working tree against
    # the most recently published version of each crate and fails on a
    # breaking change that isn't matched by a major (>=1.0.0) version bump.
    # For pre-1.0 crates a breaking change is allowed with a minor bump, so
    # this primarily acts as a TRIPWIRE while we are still on 0.x and becomes
    # a hard gate once crates cross to 1.0.0. It is left gating (no
    # continue-on-error) so an accidental breaking change is caught before
    # the GA publish.
    name: cargo-semver-checks (0.x -> 1.0 gate)
    runs-on: [self-hosted, Linux, X64, kvm]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.1
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks
      # --workspace checks every member that is published (has a version on
      # crates.io); members not yet published are skipped by the tool with a
      # note rather than failing the job.
      - run: cargo semver-checks check-release --workspace
