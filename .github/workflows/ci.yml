# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: ""

# Cancel in-progress runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Job sizing rationale (Wave 13 CI capacity reduction):
#   * Self-hosted KVM runner pool is the bottleneck across the
#     ferro-* org — 13 repos x N PRs all share it. Total per-PR
#     KVM-job count is the headline metric, NOT per-job wall time.
#     Local profile on a 12 vCPU host shows the entire test suite
#     runs in ~9s of wall time after build; cargo check is ~24s
#     cold, ~2s warm with Swatinem cache.
#   * `cargo check` is folded into `clippy` (clippy is a superset).
#   * Cross-OS test matrix moved to `.github/workflows/cross-os.yml`
#     (weekly cron) — Linux KVM is the canonical target, ubuntu /
#     macos / windows are sanity checks that don't need to gate
#     every PR.
#   * `cargo install <tool>` replaced with `taiki-e/install-action`
#     which fetches a prebuilt binary (saves ~60-180s per job vs
#     building cargo-audit / cargo-deny from source).
#   * Coverage is push-on-main only (see coverage.yml).

jobs:
  clippy:
    # Supersedes a separate `cargo check` job — clippy implies check.
    name: clippy (-D warnings)
    runs-on: [self-hosted, Linux, X64, kvm]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.1
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  fmt:
    name: cargo fmt
    runs-on: [self-hosted, Linux, X64, kvm]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.1
          components: rustfmt
      - run: cargo fmt --all -- --check

  test:
    name: cargo test (KVM)
    runs-on: [self-hosted, Linux, X64, kvm]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.1
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  msrv:
    name: MSRV (1.88)
    runs-on: [self-hosted, Linux, X64, kvm]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2
      # MSRV check uses --no-default-features semantics consistent with
      # what we promise in each crate's README.
      - run: cargo check --workspace --all-targets

  deny:
    name: cargo deny
    runs-on: [self-hosted, Linux, X64, kvm]
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  audit:
    name: cargo audit
    runs-on: [self-hosted, Linux, X64, kvm]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.1
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit --deny warnings

  docs:
    name: cargo doc
    runs-on: [self-hosted, Linux, X64, kvm]
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.1
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features
