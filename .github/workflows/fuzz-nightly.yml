# SPDX-License-Identifier: Apache-2.0
name: Fuzz (nightly)

on:
  schedule:
    # 03:17 UTC daily — off-peak so it doesn't compete with PR CI.
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      total_time_seconds:
        description: "Time per fuzz target in seconds"
        required: false
        default: "300"

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: cargo fuzz
    runs-on: [self-hosted, Linux, X64, kvm]
    strategy:
      fail-fast: false
      matrix:
        crate: [ferro-lumberjack, ferro-airflow-dag-parser]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Run all fuzz targets
        env:
          TOTAL_TIME: ${{ github.event.inputs.total_time_seconds || '300' }}
        run: |
          set -euo pipefail
          cd "crates/${{ matrix.crate }}/fuzz"
          if [ ! -f Cargo.toml ]; then
            echo "No fuzz dir for ${{ matrix.crate }}, skipping."
            exit 0
          fi
          targets=$(cargo fuzz list)
          if [ -z "$targets" ]; then
            echo "No fuzz targets defined."
            exit 0
          fi
          for t in $targets; do
            echo "=== fuzzing $t for ${TOTAL_TIME}s ==="
            cargo fuzz run "$t" -- -max_total_time="${TOTAL_TIME}"
          done
      - name: Upload corpus artefacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-failures-${{ matrix.crate }}
          path: |
            crates/${{ matrix.crate }}/fuzz/artifacts/
            crates/${{ matrix.crate }}/fuzz/corpus/
