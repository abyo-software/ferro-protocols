# SPDX-License-Identifier: Apache-2.0
name: Coverage

# Coverage instrumentation makes the build 2-5x slower than a plain test
# run and uploads to Codecov / S3 on success. There's no value in
# producing a fresh coverage report for every PR commit — Codecov
# reports historical coverage on the merged main branch, not on
# uncommitted PRs. Running on push-to-main + manual dispatch frees
# the KVM runner pool for PR-blocking jobs.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  llvm-cov:
    name: cargo llvm-cov
    runs-on: [self-hosted, Linux, X64, kvm]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.1
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage (lcov + cobertura)
        run: |
          cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
          cargo llvm-cov report --cobertura --output-path cobertura.xml
      - name: Upload coverage artefact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            lcov.info
            cobertura.xml
      - name: Upload to Codecov (optional, opt-in via secret)
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: lcov.info
          fail_ci_if_error: false
