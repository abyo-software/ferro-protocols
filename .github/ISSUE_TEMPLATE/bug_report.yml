# SPDX-License-Identifier: Apache-2.0
name: Bug report
description: Something is broken in a published crate.
title: "[<crate>] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. A **minimal reproducer is required** —
        issues without one may be closed pending more information. See
        [CONTRIBUTING.md](../CONTRIBUTING.md) for our triage policy.

  - type: input
    id: crate
    attributes:
      label: Crate
      description: Which crate in the workspace?
      placeholder: ferro-lumberjack
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: The crate version where you observed the bug.
      placeholder: 0.0.1
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you observe? Include error messages and stack traces verbatim.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproducer
      description: Smallest possible code / input / steps that reproduce the issue.
      render: rust
    validations:
      required: true

  - type: input
    id: rustc
    attributes:
      label: rustc version
      placeholder: rustc 1.91.1 (...)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / platform
      placeholder: Ubuntu 24.04 x86_64 / macOS 15 aarch64 / Windows 11
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else relevant — related upstream issue, network conditions, etc.
