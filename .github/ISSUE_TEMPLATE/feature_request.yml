# SPDX-License-Identifier: Apache-2.0
name: Feature request
description: Propose new behaviour for an existing crate.
title: "[<crate>] feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Per [CONTRIBUTING.md](../CONTRIBUTING.md), feature requests are
        collected for the next minor release of the affected crate.
        We do not respond to each one individually but read all of them.

  - type: input
    id: crate
    attributes:
      label: Crate
      placeholder: ferro-lumberjack
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not the proposed solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behaviour (optional)

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered (optional)

  - type: textarea
    id: spec
    attributes:
      label: Spec reference (if applicable)
      description: Section of the upstream specification that motivates this request.
